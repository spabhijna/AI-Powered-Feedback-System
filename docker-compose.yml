services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: feedback_app
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite://feedback.db}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      ENV: ${ENV:-production}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      LOCAL_FALLBACK: ${LOCAL_FALLBACK:-false}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
    volumes:
      - huggingface_cache:/root/.cache/huggingface
      - sqlite_data:/app/data
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: feedback_dashboard
    environment:
      API_BASE: ${API_BASE:-http://app:8000}
    ports:
      - "8501:8501"
    depends_on:
      - app
    restart: unless-stopped
    command: streamlit run dashboard/Home.py --server.port 8501 --server.address 0.0.0.0

volumes:
  sqlite_data:
    driver: local
  huggingface_cache:
    driver: local
